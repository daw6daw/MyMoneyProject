<!DOCTYPE html>
<html lang="ru"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <meta charset="UTF-8">
  <title>Регистрация</title>
</head>
<body>
<div layout:fragment="content">

  <!-- Ограничиваем общую ширину формы и центрируем её с помощью mx-auto -->
  <div class="container py-4" style="max-width: 500px;">

    <h1 class="text-center mb-4">Регистрация</h1>

    <form class="row g-3">

      <!-- Все классы col-md-4 изменены на col-12 для вертикального отображения -->
      <div class="col-12">
        <label for="validationDefault02" class="form-label">Фамилия</label>
        <input type="text" class="form-control" id="validationDefault02" required>
      </div>

      <div class="col-12">
        <label for="validationDefault01" class="form-label">Имя</label>
        <input type="text" class="form-control" id="validationDefault01" required>
      </div>

      <div class="col-12">
        <label for="validationDefault03" class="form-label">Отчество</label>
        <input type="text" class="form-control" id="validationDefault03">
      </div>

      <div class="col-12">
        <label for="validationDefaultUsername" class="form-label">Логин</label>
        <div class="input-group">
          <span class="input-group-text" id="inputGroupPrepend2">@</span>
          <input type="text" class="form-control" id="validationDefaultUsername" aria-describedby="inputGroupPrepend2" required>
        </div>
      </div>

      <div class="col-12">
        <label for="validationDefault04" class="form-label">Пароль</label>
        <input type="password" class="form-control" id="validationDefault04" required>
      </div>

      <div class="col-12">
        <label for="validationDefault05" class="form-label">Повторите пароль</label>
        <input type="password" class="form-control" id="validationDefault05" required>
      </div>

      <div class="col-12">
        <label for="validationDefault06" class="form-label">Телефон</label>
        <!-- Изменено на type="tel" для корректного ввода телефонных номеров -->
        <input type="tel" class="form-control" id="validationDefault06" required>
      </div>

      <!-- Кнопка отправки на всю ширину -->
      <div class="col-12 mt-4">
        <button class="btn btn-primary w-100" type="submit">Зарегистрироваться</button>
      </div>

    </form>
  </div>
</div>
</body>
</html>
