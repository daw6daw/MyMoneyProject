<!DOCTYPE html>
<html lang="ru"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <meta charset="UTF-8">
  <title>Войти</title>
</head>
<body>
<div layout:fragment="content">

  <form method="POST" th:action="@{/user/login}">

    <!-- Ограничиваем общую ширину формы и центрируем её с помощью mx-auto -->
    <div class="container py-4" style="max-width: 500px;">

      <div th:if="${param.error}">
        <div class="alert alert-danger">
          <p style="...">Неверный логин или пароль</p>
        </div>
      </div>

      <h1 class="text-center mb-4">Войти</h1>

      <div class="form-group col-12">
        <label for="login" class="form-label">Логин</label>
        <input name="username" type="text" class="form-control" id="login" placeholder="login" required>
      </div>

      <div class="form-group col-12">
        <label for="password" class="form-label">Пароль</label>
        <input name="password" type="password" class="form-control" id="password" placeholder="*****" required>
      </div>

      <!-- Кнопка отправки на всю ширину -->
      <div class="form-group col-12 mt-4">
        <button class="btn btn-primary w-100" type="submit">Войти</button>
      </div>
    </div>
  </form>
</div>
</body>
</html>
