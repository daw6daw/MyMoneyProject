<!DOCTYPE html>
<html lang="ru"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Все пользователи</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-4" >
        <h1>Все пользователи</h1>
    </div>
    <table class="table">
        <thead>
        <tr>
            <th scope="col">Фамилия</th>
            <th scope="col">Имя</th>
            <th scope="col">Отчество</th>
            <th scope="col">Электронная почта</th>
            <th scope="col">Логин</th>
            <th scope="col">Номер</th>
            <th scope="col">Роль</th>
            <th scope="col">Дата регистрации</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.getLastName()}"></td>
            <td th:text="${user.getFirstName()}"></td>
            <td th:text="${user.getMiddleName()}"></td>
            <td th:text="${user.getEmail()}"></td>
            <td>
                <a class="user-link" th:href="'/user/' + ${user.getId()}"
                th:text="${user.getLogin()}">Логин</a>
            </td>
            <td th:text="${user.getNumber()}"></td>
            <td th:text="${user.getRole().getRoleName()}"></td>
            <td th:text="${#temporals.format(user.createdWhen, 'dd.MM.yyyy HH:mm')}"></td>
        </tr>
        </tbody>

    </table>
    <div>
        <nav aria-label="Pagination" th:if="${users.totalPages gt 0}">
            <ul class="pagination justify-content-center font-weight-bold">
                <!-- Кнопка Назад -->
                <li class="page-item" th:classappend="${users.number eq 0} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/user/allUsers?page={id}(id=${users.number lt 2 ? 1 : users.number})}"
                       aria-label="Previous" title="Previous Page" data-toggle="tooltip">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>

                <!-- Кнопки страниц (1, 2, 3...) -->
                <li class="page-item" th:classappend="${i eq users.number + 1} ? 'active'"
                    th:each="i : ${#numbers.sequence(1, users.totalPages, 1)}">
                    <a class="page-link" th:href="@{/user/allUsers?page={id}(id=${i})}" th:text="${i}"
                       th:title="${'Page ' + i}" data-toggle="tooltip"></a>
                </li>

                <!-- Кнопка Вперед -->
                <li class="page-item" th:classappend="${users.number eq users.totalPages - 1} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/user/allUsers?page={id}(id=${users.number + 2})}"
                       aria-label="Next" title="Next Page" data-toggle="tooltip">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

</div>
</body>
</html>
