<!DOCTYPE html>
<html lang="ru"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <meta charset="UTF-8">
  <title>Регистрация</title>
</head>
<body>
<div layout:fragment="content">

  <!-- Ограничиваем общую ширину формы и центрируем её с помощью mx-auto -->
  <div class="container py-4" style="max-width: 500px;">

    <h1 class="text-center mb-4">Регистрация</h1>

    <form class="row g-3" method="POST" th:action="@{/user/registration}" th:object="${userForm}">

      <!-- Все классы col-md-4 изменены на col-12 для вертикального отображения -->
      <div class="col-12">
        <label for="lastName" class="form-label">Фамилия</label>
        <input th:field="*{lastName}" type="text" class="form-control" id="lastName" placeholder="Петров" required>
      </div>

      <div class="col-12">
        <label for="firstName" class="form-label">Имя</label>
        <input th:field="*{firstName}" type="text" class="form-control" id="firstName" placeholder="Александр" required>
      </div>

      <div class="col-12">
        <label for="middleName" class="form-label">Отчество</label>
        <input th:field="*{middleName}" type="text" class="form-control" id="middleName" placeholder="Олегович">
      </div>

      <div class="col-12">
        <label for="login" class="form-label">Логин</label>
        <div class="input-group">
          <span class="input-group-text" id="inputGroupPrepend2">@</span>
          <input th:field="*{login}" type="text" class="form-control" id="login" aria-describedby="inputGroupPrepend2" placeholder="petrovalex83" required>
        </div>
      </div>

      <div class="col-12" th:if="${#fields.hasErrors('login')}">
        <div class="alert alert-danger py-2 px-3 mb-0 text-center style-error">
          <p class="mb-0" th:errors="*{login}"></p>
        </div>
      </div>

      <div class="col-12">
        <label for="email" class="form-label">Электронная почта</label>
        <input th:field="*{email}" type="email" class="form-control" id="email" placeholder="petrovalex@mail.ru" required>
      </div>

      <div class="col-12" th:if="${#fields.hasErrors('email')}">
        <div class="alert alert-danger py-2 px-3 mb-0 text-center style-error">
          <p class="mb-0" th:errors="*{email}"></p>
        </div>
      </div>

      <div class="col-12">
        <label for="password" class="form-label">Пароль</label>
        <input name="password" type="password" class="form-control" id="password" placeholder="Пароль" required>
      </div>

<!--      <div class="col-12">-->
<!--        <label for="password2" class="form-label">Повторите пароль</label>-->
<!--        <input name="password2" type="password" class="form-control" id="password2" placeholder="Пароль" required>-->
<!--      </div>-->

      <div class="col-12">
        <label for="number" class="form-label">Телефон</label>
        <!-- Изменено на type="tel" для корректного ввода телефонных номеров -->
        <input th:field="*{number}" type="tel" class="form-control" id="number" placeholder="+7 980 999 99 99" minlength="12"
               maxlength="12"
               pattern="\+7[0-9]{10}"
               title="Номер должен начинаться с +7 и содержать 11 цифр (например, +79879879898)" required>
      </div>

      <!-- Кнопка отправки на всю ширину -->
      <div class="col-12 mt-4">
        <button class="btn btn-primary w-100" type="submit">Зарегистрироваться</button>
      </div>

    </form>
  </div>
</div>
</body>
</html>
